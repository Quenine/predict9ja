name: TxLINE fixture catalogue sync

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: read

concurrency:
  group: txline-fixture-catalogue-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DATABASE_URL: ${{ secrets.PRISMA_ACCELERATE_URL }}
      PRISMA_ACCELERATE_URL: ${{ secrets.PRISMA_ACCELERATE_URL }}
      TXLINE_API_TOKEN: ${{ secrets.TXLINE_API_TOKEN }}
      TXLINE_NETWORK: devnet
      TXLINE_REQUEST_TIMEOUT_MS: "30000"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.12.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Generate engine-free Prisma Client
        run: pnpm --filter @predict9ja/db exec prisma generate --no-engine
      - name: Synchronize safe TxLINE fixture catalogue
        run: pnpm txline:sync-fixtures
